<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜水店活动报备</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #1e3a5f; font-size: 24px; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 30px;
            background: #07c160;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn-secondary {
            background: #2c5282;
        }
        .tips {
            margin-top: 20px;
            padding: 12px;
            background: #f0f9ff;
            border-radius: 8px;
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏊‍♂️</div>
        <h1>浩海潜水活动报备</h1>
        <p class="subtitle">请填写您的活动报备信息</p>
        
        <!-- 尝试直接打开 -->
        <a href="https://hoohigh.dpdns.org/report.html" class="btn">
            直接打开报备表
        </a>
        
        <!-- 用系统浏览器打开 -->
        <button class="btn btn-secondary" onclick="openInBrowser()">
            在浏览器中打开
        </button>
        
        <div class="tips">
            如果上方按钮无法打开，请点击"在浏览器中打开"<br>
            系统会自动调用手机浏览器访问
        </div>
    </div>

    <script>
        function openInBrowser() {
            const url = 'https://hoohigh.dpdns.org/report.html';
            
            // 尝试多种方式调用系统浏览器
            // 方式1：使用 intent 协议（Android）
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = 'intent://hoohigh.dpdns.org/report.html#Intent;scheme=https;package=com.android.chrome;end';
                return;
            }
            
            // 方式2：使用 Google Chrome URL scheme
            window.location.href = 'googlechrome://navigate?url=' + encodeURIComponent(url);
            
            // 方式3：延迟后尝试 Safari（iOS）
            setTimeout(function() {
                window.location.href = url;
            }, 500);
        }
    </script>
</body>
</html>
